services:
  # 1. The Main FastAPI Web Service
  - type: web
    name: atlas-schema-architect
    env: python
    plan: free # Change to 'starter' or higher for production scaling
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: CARGO_HOME
        value: /opt/render/project/src/.cargo
      - key: GROQ_API_KEY
        sync: false # Set this manually in the Render Dashboard for security
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-main-db
          property: connectionString
      - key: SANDBOX_URL
        fromDatabase:
          name: atlas-sandbox-db
          property: connectionString
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHONPATH
        value: .

databases:
  # 2. The Primary Database
  - name: atlas-main-db
    databaseName: atlas_prod
    user: atlas_admin
    plan: free

  # 3. The Transient Sandbox Database
  # Used for Phase 5: Self-Healing Validation
  - name: atlas-sandbox-db
    databaseName: atlas_sandbox
    user: sandbox_user
    plan: free

version: "1"